# Deny policy for nusantara-calendar workspace
# This configuration prevents problematic dependencies from being added

[graph]
# Don't include dev-dependencies in the license graph
dev-dependencies = false

[licenses]
# List of explicitly allowed licenses
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "CC0-1.0",
]

# List of explicitly denied licenses
deny = [
    # GPL licenses are incompatible with our MIT/Apache-2.0 dual license
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-1.0",
    "AGPL-3.0",
]

# Allow exceptions for specific crates
exceptions = [
    # Allow exceptions if needed (e.g., for well-known libraries with compatible licenses)
]

# Confidence threshold for license detection (0.0-1.0)
confidence-threshold = 0.8

[bans]
# Tree-ban specific crates to prevent problematic dependencies
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = [
    # Deny specific problematic crates if needed
    # { name = "problematic-crate", version = "*" },
]

[sources]
# Only allow dependencies from known sources
allow = [
    "https://github.com",
    "https://gitlab.com",
    "https://crates.io",
]

deny = [
    # Deny unknown git sources
    { git = "https://private.example.com" },
]

[ advisories ]
# Vulnerability detection
vulnerability = "deny"
unmaintained = "warn"
unsound = "deny"
ignore = [
    # Add specific advisories to ignore if necessary
    # { id = "RUSTSEC-2023-0001", reason = "False positive" },
]
