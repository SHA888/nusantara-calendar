# Deny policy for nusantara-calendar workspace
# This configuration prevents problematic dependencies from being added

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "x86_64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "wasm32-unknown-unknown" },
]

[licenses]
# List of explicitly allowed licenses
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
]

# Confidence threshold for license detection (0.0-1.0)
confidence-threshold = 0.8

[bans]
# Tree-ban specific crates to prevent problematic dependencies
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

[sources]
# Only allow dependencies from known sources
unknown-registry = "deny"
unknown-git = "deny"

[advisories]
# Vulnerability detection
unmaintained = "workspace"
unsound = "workspace"
ignore = [
    # Add specific advisories to ignore if necessary
    # { id = "RUSTSEC-2023-0001", reason = "False positive" },
]
