# Pre-commit hooks for nusantara-calendar Rust workspace
# Install with: pre-commit install
# Update with: pre-commit autoupdate

repos:
  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        description: Remove trailing whitespace
      - id: end-of-file-fixer
        description: Ensure files end with newline
      - id: check-yaml
        description: Check YAML syntax
      - id: check-toml
        description: Check TOML syntax
      - id: check-merge-conflict
        description: Check for merge conflict markers
      - id: check-added-large-files
        description: Prevent large files from being committed
        args: ['--maxkb=1000']
      - id: check-case-conflict
        description: Check for case conflicts

  # Rust specific hooks
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: cargo-check
        description: Run cargo check to validate compilation
        args: ['--workspace', '--all-targets', '--all-features']
      - id: clippy
        description: Run cargo clippy for linting
        args: ['--workspace', '--all-targets', '--all-features', '--', '-D', 'warnings']

  # Custom hooks for formatting, security, license, and documentation
  - repo: local
    hooks:
      - id: rustfmt
        name: rustfmt
        entry: cargo fmt --all
        language: system
        description: Format Rust code with rustfmt
        files: '^.*\.rs$'
        types: [rust]
        pass_filenames: false

      - id: cargo-audit
        name: cargo-audit
        entry: cargo audit
        language: system
        description: Check Rust dependencies for security vulnerabilities
        files: '^Cargo\.lock$'
        pass_filenames: false

      - id: cargo-deny
        name: cargo-deny
        entry: cargo deny check
        language: system
        description: Check license compliance and security advisories
        files: '^Cargo\.toml$|^Cargo\.lock$'
        pass_filenames: false

      - id: cargo-doc
        name: cargo-doc
        entry: cargo doc --no-deps --document-private-items --workspace --all-features
        language: system
        description: Build documentation to check for broken links
        files: '^src/.*\.rs$|^Cargo\.toml$'
        pass_filenames: false

      - id: check-crate-structure
        name: check-crate-structure
        entry: bash -c 'find crates -name Cargo.toml | while read f; do crate=$(basename $(dirname $f)); if ! grep -q "^name = \"$crate\"" "$f"; then echo "Crate name mismatch in $f"; exit 1; fi; done'
        language: system
        description: Ensure crate names match directory names
        files: '^crates/.*Cargo\.toml$'

      - id: test-workspace
        name: test-workspace
        entry: cargo test --workspace --all-features
        language: system
        description: Run all workspace tests with all features
        files: '^src/.*\.rs$|^Cargo\.toml$'
        pass_filenames: false

      - id: test-no-std
        name: test-no-std
        entry: cargo test --workspace --no-default-features
        language: system
        description: Test no_std compilation and functionality
        files: '^src/.*\.rs$|^Cargo\.toml$'
        pass_filenames: false

      - id: test-wasm
        name: test-wasm
        entry: cargo build --target wasm32-unknown-unknown --workspace --no-default-features
        language: system
        description: Test WASM compilation
        files: '^src/.*\.rs$|^Cargo\.toml$'
        pass_filenames: false

# Configuration
default_language_version:
  python: python3

# Fail fast on first hook failure
fail_fast: false

# Skip hooks on certain files
exclude: |
  (?x)^(
    \.git/.*|
    \.cargo/.*|
    target/.*|
    \.vscode/.*|
    \.idea/.*|
    Cargo\.lock
  )$
